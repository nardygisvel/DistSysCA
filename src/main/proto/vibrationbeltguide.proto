syntax = "proto3";

package vibrationbeltguide;

option java_multiple_files = true;
option java_package = "generated.belt";

service BeltService {
  /* * SERVER-SIDE STREAMING
   * Client sends one 'NavRequest' (the destination).
   * Server stays open and sends many 'NavInstruction' messages 
   * (like a GPS: "Turn left", "Go straight", etc.).
   */
  rpc GetNavigation (NavRequest) returns (stream NavInstruction);
}

message NavRequest {
  string destination = 1; // Destination name like "Loading Dock B"
}

message NavInstruction {
  string direction = 1; // "LEFT", "RIGHT", "FORWARD", "ARRIVED"
  int32 intensity = 2;  // How strong the belt should vibrate (1 to 5)
}