syntax = "proto3";

package epilepsybracelet;

option java_multiple_files = true;
option java_package = "generated.bracelet";

service BraceletService {
  /* * BIDIRECTIONAL STREAMING
   * Both client and server keep their "microphones" open.
   * Client sends 'HeartData' constantly.
   * Server sends 'HealthAlert' ONLY when it detects something wrong.
   */
  rpc MonitorHealth (stream HeartData) returns (stream HealthAlert);
}

message HeartData {
  int32 bpm = 1; // Heart rate: Beats Per Minute
}

message HealthAlert {
  // GUI can use these strings to change colors: "NORMAL" (Green), "CRITICAL" (Red)
  string alert_level = 1; 
  string message = 2;      // Advice like "Please sit down" or "Help is coming"
}